<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros Valores</title>
<style>
  :root {
    --azul-principal: #036aff;
    --azul-medio: #0077c8;
    --azul-profundo: #003a5d;
    --azul-noche: #051c2c;
    --blanco: #ffffff;
    --linea: rgba(255,255,255,0.14);

    /* Colores de identidad de cada valor */
    --equipo: #f5c518;
    --talento: #16a96a;
    --protagonistas: #a05bb5;
    --excelencia: #ef4d3a;
    --clientes: #1fa9b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 12% -10%, rgba(3,106,255,0.28), transparent 45%),
      radial-gradient(circle at 95% 8%, rgba(0,119,200,0.18), transparent 42%),
      var(--azul-noche);
    color: var(--blanco);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1140px; margin: 0 auto; padding: 64px 32px 90px; }

  .eyebrow {
    font-size: 18px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--azul-principal); font-weight: 700; margin-bottom: 18px;
  }
  h1 {
    font-size: clamp(40px, 6vw, 72px); line-height: 1.0; font-weight: 800;
    letter-spacing: -0.02em;
  }
  h1 .light { color: var(--azul-principal); }
  .intro {
    margin-top: 22px; font-size: clamp(19px, 2.4vw, 24px); line-height: 1.6;
    color: rgba(255,255,255,0.74); max-width: 60ch;
  }
  .hint {
    margin-top: 14px; font-size: 14px; color: rgba(255,255,255,0.5);
    display: inline-flex; align-items: center; gap: 8px;
  }

  .divider { height: 1px; background: var(--linea); margin: 50px 0 46px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 22px;
  }
  /* Cada tarjeta ocupa 2 columnas: 3 por fila */
  .flip { grid-column: span 2; }
  /* Las dos últimas se centran en la fila inferior */
  .flip.v4 { grid-column: 2 / span 2; }
  .flip.v5 { grid-column: 4 / span 2; }

  /* Tarjeta volteable */
  .flip {
    background: transparent;
    perspective: 1600px;
    height: 380px;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .flip:focus-visible { outline: 3px solid var(--blanco); outline-offset: 4px; border-radius: 20px; }

  .inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1);
    transform-style: preserve-3d;
  }
  .flip[aria-pressed="true"] .inner { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 20px;
    padding: 30px 28px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Frente */
  .front {
    background: var(--c);
    color: #10202e;
    justify-content: space-between;
  }
  .front.dark-text { color: #10202e; }
  .front.light-text { color: #ffffff; }

  .vicon {
    height: 88px;
    display: flex; align-items: center;
    margin-bottom: 6px;
  }
  .vicon img { height: 88px; width: auto; display: block; }
  .vtitle {
    font-size: 28px; line-height: 1.12; font-weight: 800;
    letter-spacing: -0.01em; margin-top: auto;
  }
  .vlema {
    margin-top: 14px; font-size: 15px; line-height: 1.5;
    font-weight: 600; font-style: italic; opacity: 0.92;
  }
  .vflip-ico {
    position: absolute; top: 26px; right: 26px;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.14);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .front.light-text .vflip-ico { background: rgba(255,255,255,0.2); }

  /* Reverso */
  .back {
    background: #0c2233;
    border: 2px solid var(--c);
    transform: rotateY(180deg);
    color: #ffffff;
  }
  .back-title {
    font-size: 19px; font-weight: 800; color: var(--c);
    margin-bottom: 16px; letter-spacing: -0.01em;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .conductas {
    list-style: none; display: flex; flex-direction: column; gap: 13px;
    overflow-y: auto; padding-right: 4px;
  }
  .conductas li {
    font-size: 16px; line-height: 1.5;
    color: rgba(255,255,255,0.9);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .conductas li::before {
    content: "✓"; color: var(--c); font-weight: 800; flex-shrink: 0;
  }
  .conductas::-webkit-scrollbar { width: 5px; }
  .conductas::-webkit-scrollbar-thumb { background: var(--c); border-radius: 3px; }

  .v1 { --c: var(--equipo); }
  .v2 { --c: var(--talento); }
  .v3 { --c: var(--protagonistas); }
  .v4 { --c: var(--excelencia); }
  .v5 { --c: var(--clientes); }

  footer { margin-top: 54px; font-size: 13px; color: rgba(255,255,255,0.4); }

  @media (max-width: 880px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .flip, .flip.v4, .flip.v5 { grid-column: auto; }
  }
  @media (max-width: 580px) {
    .grid { grid-template-columns: 1fr; }
    .flip, .flip.v4, .flip.v5 { grid-column: auto; }
    .wrap { padding: 48px 22px 64px; }
    .flip { height: 320px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .inner { transition: none; }
  }
</style>
</head>
